
<html>
<head>
    <title>WUKU</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .navbar {
            background: #ee4d2d;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .produk {
            display: flex;
            flex-wrap: wrap;
            justify-content: left;
            padding: 20px;
        }

        .card {
            background: white;
            width: 180px;
            margin: 10px;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .harga {
            color: #ee4d2d;
            font-weight: bold;
        }

        button {
            background: #ee4d2d;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .cart {
            position: fixed;
            right: 10px;
            top: 60px;
            background: white;
            padding: 15px;
            width: 240px;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .hapus {
            background: red;
            margin-left: 10px;
            padding: 3px 6px;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 5px;
            padding: 5px;
        }
    </style>
</head>

<body>

<div class="navbar">
    Wuku 🛒
</div>

<div class="produk">

    <div class="card">
        <img src="https://static.republika.co.id/uploads/images/inpicture_slide/salah-satu-varian-boneka-labubu-meski-harganya-selangit-boneka_240916110102-454.jpg">
        <h4>Boneka Labubu 1</h4>
        <p class="harga">Rp45000</p>
        <button onclick="tambah('Produk 1',45000)">+ Keranjang</button>
    </div>

<div class="card">
        <img src="https://cdn1.katadata.co.id/media/images/thumb/2024/09/18/Labubu-2024_09_18-15_18_58_67664188a9a734bf3d0177ec7244e7f8_960x640_thumb.png">
        <h4>Boneka Labubu 2</h4>
        <p class="harga">Rp45000</p>
        <button onclick="tambah('Produk 1',45000)">+ Keranjang</button>
    </div>

</div>

<!-- KERANJANG -->
<div class="cart">
    <h4>Keranjang</h4>
    <ul id="list"></ul>

    <p>Total: Rp<span id="total">0</span></p>

    <hr>

    <h4>Data Pembeli</h4>

    <input type="text" id="nama" placeholder="Nama">
    <input type="text" id="alamat" placeholder="Alamat bisa di isi nanti">
    <input type="text" id="hp" placeholder="No HP">
    <textarea id="catatan" placeholder="Catatan"></textarea>

    <br>
    <button onclick="checkout()">Checkout</button>
</div>

<script>
let total = 0;
let pesanan = [];

function tambah(nama, harga) {
    let list = document.getElementById("list");

    let item = document.createElement("li");
    item.textContent = nama + " - Rp" + harga;

    let btn = document.createElement("button");
    btn.textContent = "X";
    btn.className = "hapus";

    btn.onclick = function() {
        list.removeChild(item);
        total -= harga;
        updateTotal();
    };

    item.appendChild(btn);
    list.appendChild(item);

    total += harga;
    pesanan.push(nama);

    updateTotal();
}

function updateTotal() {
    document.getElementById("total").textContent = total;
}

function checkout() {
    let nama = document.getElementById("nama").value;
    let alamat = document.getElementById("alamat").value;
    let hp = document.getElementById("hp").value;
    let catatan = document.getElementById("catatan").value;

    let teks = "🛒 Pesanan Baru:%0A";

    pesanan.forEach(function(item){
        teks += "- " + item + "%0A";
    });

    teks += "%0A💰 Total: Rp" + total;
    teks += "%0A%0A👤 Nama: " + nama;
    teks += "%0A📍 Alamat: " + alamat;
    teks += "%0A📞 No HP: " + hp;
    teks += "%0A📝 Catatan: " + catatan;

    window.open("https://wa.me/6285762461308?text=" + teks);
}
</script>

</body>
</html>
